{% extends "layout.html" %}
{% block content %}
    <h1>Miniblog</h1>
    <article>
        <img class="rounded-circle article-img" src="{{ url_for('static', filename = 'profile_pics/' + post.author.image_file) }}" height="60px">
        <div class="article-info">
          <a href="{{ url_for('users.user_posts', username=post.author.username) }}">{{ post.author.username }}</a>
          <small class="text-muted">{{ post.date_posted.strftime('%d-%m-%Y') }}</small>
          {% if post.author == current_user %}
            <div>
                <a class="button" href="{{ url_for('posts.update_post', post_id=post.id) }}">Update</a>
                <form action="{{ url_for('posts.delete_post', post_id=post.id) }}" method="POST">
                  <input class="btn btn-danger" type="submit" value="Delete">
                </form>
            </div>
          {% endif %}
        </div>
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
    </article>
   
{% endblock content %}
