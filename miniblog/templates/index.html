{% extends "layout.html" %}
{% block content %}
    <h1>Miniblog</h1>
    {% for post in posts %}
    <article>
        <div class="article-info">
          <a href="#">{{ post.author }}</a>
          <small class="text-muted">{{ post.date_posted }}</small>
        </div>
        <h2><a href="#">{{ post.title }}</a></h2>
        <p>{{ post.content }}</p>
    </article>
    {% endfor %}
{% endblock content %}
